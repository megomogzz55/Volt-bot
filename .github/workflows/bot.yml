name: Fantasy Volt Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # كل 5 دقايق
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'تشغيل تجربة كارت الهدف'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Run bot
        env:
          FB_FANTASY_PAGE_ID: ${{ secrets.FB_FANTASY_PAGE_ID }}
          FB_FANTASY_ACCESS_TOKEN: ${{ secrets.FB_FANTASY_ACCESS_TOKEN }}
          FB_NEWS_PAGE_ID: ${{ secrets.FB_NEWS_PAGE_ID }}
          FB_NEWS_ACCESS_TOKEN: ${{ secrets.FB_NEWS_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: python main.py
