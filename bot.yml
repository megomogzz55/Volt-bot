name: 🤖 Fantasy Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # كل 5 دقايق
  workflow_dispatch:          # تشغيل يدوي للاختبار

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run Fantasy Bot
        env:
          FB_FANTASY_PAGE_ID:      ${{ secrets.FB_FANTASY_PAGE_ID }}
          FB_FANTASY_ACCESS_TOKEN: ${{ secrets.FB_FANTASY_ACCESS_TOKEN }}
          FB_NEWS_PAGE_ID:         ${{ secrets.FB_NEWS_PAGE_ID }}
          FB_NEWS_ACCESS_TOKEN:    ${{ secrets.FB_NEWS_ACCESS_TOKEN }}
          TG_BOT_TOKEN:            ${{ secrets.TG_BOT_TOKEN }}
          TG_FANTASY_CHANNEL:      ${{ secrets.TG_FANTASY_CHANNEL }}
          TG_NEWS_CHANNEL:         ${{ secrets.TG_NEWS_CHANNEL }}
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 💾 Save state
        if: always()
        uses: actions/cache@v4
        with:
          path: state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: bot-state-
